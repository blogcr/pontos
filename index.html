<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Últimas Publicações</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700;900&display=swap" rel="stylesheet">

<style>

body{
font-family:'Arimo',sans-serif;
background:#f4f4f4;
margin:20px 0;
padding:20px;
}

.container{
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
}

.card{
position:relative;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-decoration:none;
display:block;
transition:transform .2s ease;
background:#000;
}

.card:hover{
transform:scale(1.02);
}

.card-img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.15));
padding:18px;
}

/* contador */

.views{
position:absolute;
top:12px;
right:12px;
background:rgba(0,0,0,0.65);
padding:8px 12px;
border-radius:20px;
color:#fff;
text-align:right;
z-index:2;
}

.points{
font-size:14px;
font-weight:700;
}

.bottom{
position:absolute;
left:18px;
right:18px;
bottom:18px;
height:82px;
display:flex;
flex-direction:column;
}

.autor{
background:#B71C1C;
padding:7px 12px;
font-size:12px;
font-weight:700;
text-transform:uppercase;
border-radius:6px;
width:fit-content;
margin-bottom:8px;
color:#fff;
}

.titulo{
font-size:18px;
line-height:1.25;
font-weight:600;
color:#fff;

display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

</style>

</head>

<body>

<div class="container">
<div id="ultimas">Carregando...</div>
</div>

<script>

var api="https://script.google.com/macros/s/AKfycbxJkEccCVZOs4qOV45g6L_sjKH2L0US0Vpq2j8pWzyca4a8IpSbpCfuaLtKJYGtqxg/exec?tipo=ultimas";

var container=document.getElementById("ultimas");

fetch(api)
.then(r=>r.json())
.then(data=>{

if(!data || data.length===0){
container.innerHTML="Nenhum resultado.";
return;
}

container.innerHTML='<div class="grid"></div>';

var grid=container.querySelector(".grid");

data.forEach(function(item){

var imagem=item.imagem
? item.imagem.replace(/\/w\d+-h\d+[^/]*\//,"/w800/")
: "";

var card=document.createElement("a");

card.href=item.url;
card.target="_blank";
card.className="card";

card.innerHTML=`

<div class="views">
<div class="points">${item.pontuacao} <i class="fa-solid fa-book-open"></i></div>
</div>

<img src="${imagem}" class="card-img">

<div class="overlay">

<div class="bottom">
<div class="autor">${item.autor}</div>
<div class="titulo">${item.titulo}</div>
</div>

</div>
`;

grid.appendChild(card);

});

})
.catch(err=>{
console.error(err);
container.innerHTML="Erro ao carregar dados.";
});

</script>

</body>
</html>
