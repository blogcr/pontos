<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="favicon.ico">

<title>Últimas Publicações</title>

<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
font-family:'Arimo',sans-serif;
background:#f4f4f4;
margin:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:18px;
}

.card{
position:relative;
border-radius:12px;
overflow:hidden;
background:#000;
height:170px;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
text-decoration:none;
display:block;
transition:transform .2s ease;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:100%;
object-fit:cover;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.15));
}

.autor{
position:absolute;
left:18px;
top:65px;
background:#B71C1C;
padding:6px 10px;
border-radius:6px;
font-size:12px;
color:#fff;
font-weight:700;
text-transform:uppercase;
z-index:3;
}

.titulo{
position:absolute;
left:18px;
right:18px;
top:100px;
color:#fff;
font-weight:600;
font-size:18px;
line-height:1.25;
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.pontos{
position:absolute;
top:12px;
right:12px;
background:rgba(0,0,0,0.65);
padding:6px 10px;
border-radius:20px;
color:#fff;
font-size:13px;
font-weight:700;
}

@media(max-width:1200px){
.grid{grid-template-columns:repeat(3,1fr);}
}

@media(max-width:768px){
.grid{grid-template-columns:1fr;}
}

</style>

</head>

<body>

<div id="posts">Carregando...</div>

<script>

var pontuacoes={};

/* carregar pontuações históricas */

fetch("https://script.google.com/macros/s/AKfycbxJkEccCVZOs4qOV45g6L_sjKH2L0US0Vpq2j8pWzyca4a8IpSbpCfuaLtKJYGtqxg/exec?tipo=pontuacoes")
.then(r=>r.json())
.then(function(data){

pontuacoes=data;

carregarFeed();

});


function carregarFeed(){

var script=document.createElement("script");

script.src="https://www.carlosromero.com.br/feeds/posts/default?orderby=published&max-results=17&alt=json-in-script&callback=renderPosts";

document.body.appendChild(script);

}


function normalizarPath(url){

var path=new URL(url).pathname;

path=path.replace("index.html","");

return path;

}


function renderPosts(json){

var container=document.getElementById("posts");

container.innerHTML='<div class="grid"></div>';

var grid=container.querySelector(".grid");


json.feed.entry.forEach(function(entry){

var titulo=entry.title.$t;

var autor="Autor";

if(entry.category && entry.category.length>0){
autor=entry.category[0].term;
}

var link="";

entry.link.forEach(function(l){
if(l.rel=="alternate") link=l.href;
});


/* chave da pontuação */

var path=normalizarPath(link);

var pontuacao=pontuacoes[path] || 0;


/* imagem */

var imagem="";

if(entry.media$thumbnail){
imagem=entry.media$thumbnail.url.replace("s72-c","w800");
}


/* card */

var card=document.createElement("a");

card.href=link;
card.target="_blank";
card.className="card";

card.innerHTML=`

<img src="${imagem}">
<div class="overlay"></div>

<div class="autor">${autor}</div>

<div class="titulo">${titulo}</div>

<div class="pontos">
${pontuacao} <i class="fa-solid fa-chart-simple"></i>
</div>

`;

grid.appendChild(card);

});

}

</script>

</body>
</html>
